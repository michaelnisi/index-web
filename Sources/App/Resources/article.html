{{< page}}
  {{$body}}
    {{> header}}
    <main>
      <article>
        {{{post}}}
        <p class="post-meta">
            <time datetime="{{isoDate}}">{{dateString}}</time> ·
            <span class="word-count">{{wordCount}} words</span>
        </p>
      </article>
    </main>
    {{> footer}}
  {{/body}}
{{/page}}
